services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: nmapmaui_mssql
    environment:
      SA_PASSWORD: "NmapMaui@2025!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "NmapMaui@2025!", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  nmapmaui-api:
    build:
      context: ./NmapMaui.Api
      dockerfile: Dockerfile
    container_name: nmapmaui_api
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Server=mssql;Database=NmapMauiDb;User Id=sa;Password=NmapMaui@2025!;TrustServerCertificate=True;"
      Jwt__Key: "NmapMaui-SuperSecret-JWT-Key-Must-Be-32+Chars!!"
      Jwt__Issuer: "NmapMaui.Api"
      Jwt__Audience: "NmapMaui.Client"
      Jwt__ExpiryHours: "8"
    ports:
      - "5000:8080"

volumes:
  mssql_data:
